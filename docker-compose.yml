services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fulfillment-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fulfillment
      DB_USERNAME: app
      DB_PASSWORD: app
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/vendor/autoload.php"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: fulfillment-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: fulfillment-postgres
    environment:
      POSTGRES_DB: fulfillment
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "54320:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d fulfillment"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fulfillment-redis
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
